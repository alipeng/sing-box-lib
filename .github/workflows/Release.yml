name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (this repo's tag, e.g. 1.13.11-fix3)"
        required: true
        type: string
      tag:
        description: "sing-box upstream git tag (e.g. v1.13.11)"
        required: true
        type: string

jobs:
  release:
    runs-on: macOS-15
    permissions:
      contents: write

    steps:
      # 1) Check out this repo (we only need .github/ + Package.swift here).
      - uses: actions/checkout@v4

      # 2) Check out SagerNet/sing-box at the requested upstream tag —
      #    everything below mirrors that repo's
      #    `.github/workflows/build.yml` "Build library" step.
      - uses: actions/checkout@v4
        with:
          repository: SagerNet/sing-box
          path: box
          ref: ${{ github.event.inputs.tag }}

      # 3) Go version aligned with upstream sing-box's build.yml.
      #    `~1.25.9` matches what SFI/SFM/SFT are built against today.
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ~1.25.9

      # 4) `make lib_install` installs gomobile + gobind into $GOPATH/bin
      #    (`go install github.com/sagernet/gomobile/cmd/gomobile@v0.1.12`).
      #    Subsequent steps need that bin dir on PATH so `build_libbox`
      #    can find `gomobile`.
      - name: Install gomobile toolchain
        run: |
          cd box
          make lib_install

      # 5) Build the xcframework using sing-box's own build_libbox driver.
      #    Identical invocation to upstream's "Build library" step. The
      #    driver applies the right build tags + ldflags
      #    (`-X internal/godebug.defaultGODEBUG=multipathtcp=0`,
      #    `with_tailscale + ts_omit_*` slimming, `with_low_memory` for
      #    iOS/tvOS, etc.) — DO NOT replace this with a hand-rolled
      #    `gomobile bind` invocation or those settings get lost.
      # `-platform ios` produces a single-slice (ios-arm64) xcframework
      # — half the zip size of the full ios,tvos,macos build. Final iOS
      # app .ipa size is unaffected (Xcode only embeds the iOS slice
      # regardless), this just shrinks the SwiftPM download + cache.
      # Add `tvos`/`macos` back if you ever ship a Companion app.
      - name: Build xcframework
        run: |
          cd box
          export PATH="$PATH:$(go env GOPATH)/bin"
          go run ./cmd/internal/build_libbox -target apple -platform ios

      # 6) gomobile emits a Versions/A-style deep bundle. iOS apps
      #    REQUIRE shallow framework bundles for App Store submission,
      #    so flatten the ios-arm64 slice to:
      #
      #        Libbox.framework/
      #        ├── Headers/
      #        ├── Info.plist
      #        ├── Libbox            (binary)
      #        └── Modules/
      #
      #    Critically the outer xcframework Info.plist also tracks the
      #    slice's BinaryPath. If we flatten the bundle without
      #    rewriting that entry, Xcode embeds an empty stub binary
      #    (it can't find `Versions/A/Libbox` inside a flattened
      #    bundle) and dyld then fails to resolve every Libbox symbol
      #    at runtime. Rewrite per-slice layout AND outer Info.plist
      #    together.
      - name: Flatten iOS slice + sync xcframework Info.plist
        run: |
          set -euo pipefail
          cd box

          flatten_framework() {
            local fw="$1"
            if [ ! -d "$fw/Versions" ]; then
              echo "Already shallow: $fw"
              return
            fi
            local tmp; tmp="$(mktemp -d)"
            # -L follows the Versions/Current symlink chain so we copy
            # the real files, not dangling links.
            cp -RL "$fw/Libbox"  "$tmp/Libbox"
            cp -RL "$fw/Headers" "$tmp/Headers"
            cp -RL "$fw/Modules" "$tmp/Modules"
            cp    "$fw/Resources/Info.plist" "$tmp/Info.plist"
            rm -rf "$fw"
            mv "$tmp" "$fw"
          }

          flatten_framework Libbox.xcframework/ios-arm64/Libbox.framework

          # Patch the outer xcframework Info.plist so every slice's
          # BinaryPath matches its on-disk layout. iOS slice is now
          # shallow (`Libbox.framework/Libbox`); if a tvos/macos slice
          # is ever re-added, the macOS entry must keep
          # `Versions/A/Libbox`.
          PLIST=Libbox.xcframework/Info.plist
          COUNT=$(/usr/libexec/PlistBuddy -c "Print :AvailableLibraries" "$PLIST" | grep -c "^    Dict {")
          for ((i=0; i<COUNT; i++)); do
            id=$(/usr/libexec/PlistBuddy -c "Print :AvailableLibraries:$i:LibraryIdentifier" "$PLIST")
            if [[ "$id" == macos* ]]; then
              /usr/libexec/PlistBuddy -c \
                "Set :AvailableLibraries:$i:BinaryPath Libbox.framework/Versions/A/Libbox" "$PLIST"
            else
              /usr/libexec/PlistBuddy -c \
                "Set :AvailableLibraries:$i:BinaryPath Libbox.framework/Libbox" "$PLIST"
            fi
          done

          echo "=== xcframework Info.plist after patching ==="
          /usr/libexec/PlistBuddy -c "Print :AvailableLibraries" "$PLIST" \
            | grep -E "BinaryPath|LibraryIdentifier"

      # 7) Sanity check: the iOS Libbox binary must NOT be a 33KB stub.
      #    Fail the build loudly if gomobile emitted an empty slice.
      #    The iOS Libbox is a "Mach-O universal binary [arm64:current
      #    ar archive]" — `nm` output differs between Apple's
      #    clang-nm and llvm-nm and between archive vs Mach-O. We try
      #    several detection methods and only fail if NONE match.
      - name: Verify iOS slice has real Libbox symbols
        run: |
          set -euo pipefail
          cd box
          IOS_LIB=Libbox.xcframework/ios-arm64/Libbox.framework/Libbox
          if [ ! -f "$IOS_LIB" ]; then
            echo "::error::Missing iOS Libbox binary at $IOS_LIB"
            exit 1
          fi

          echo "=== file ==="
          file "$IOS_LIB"

          SIZE=$(stat -f%z "$IOS_LIB")
          echo "=== size ==="
          echo "iOS Libbox size: $SIZE bytes ($(echo "scale=1; $SIZE/1024/1024" | bc) MB)"
          if [ "$SIZE" -lt 10000000 ]; then
            echo "::error::iOS Libbox binary is $SIZE bytes (<10MB) — looks like an empty stub. Build is broken."
            exit 1
          fi

          # Print nm output for the run log (diagnostics only — pass/fail
          # below is decided by the raw byte scan instead). Using nm +
          # `if` under `set -o pipefail` is fragile: when awk hits the
          # symbol and `exit`s, nm gets SIGPIPE (exit 141), pipefail
          # propagates that, and the `if` skips the success branch even
          # though awk did match. Don't go down that road.
          echo "=== nm -gU (top LibboxSetup-related symbols) ==="
          nm -gU "$IOS_LIB" 2>&1 | awk '/_LibboxSetup/{print; n++} n==5{exit}' || true

          echo "=== nm --defined-only (top LibboxSetup-related symbols) ==="
          nm --defined-only "$IOS_LIB" 2>&1 | awk '/_LibboxSetup/{print; n++} n==5{exit}' || true

          # Authoritative check: scan the binary's raw bytes for the
          # literal symbol-name string. The string `LibboxSetup` only
          # appears in a Mach-O archive when sing-box's libbox module
          # was actually linked in — independent of nm/awk versions
          # and pipe behavior. `|| true` keeps `set -e` from aborting
          # when grep returns 1 (no match → count=0).
          echo "=== raw byte scan for 'LibboxSetup' ==="
          COUNT_RAW=$(LC_ALL=C tr '\0' '\n' < "$IOS_LIB" | grep -c "LibboxSetup" || true)
          echo "occurrences of 'LibboxSetup' in raw bytes: $COUNT_RAW"
          if [ "$COUNT_RAW" -lt 5 ]; then
            echo "::error::iOS Libbox binary has only $COUNT_RAW occurrences of 'LibboxSetup' — link failed."
            exit 1
          fi
          echo "iOS Libbox binary OK."

      # 8) Repackage + checksum + manifest + release.
      - name: Repack zip
        run: |
          cd box
          rm -f Libbox.xcframework.zip
          zip -ry Libbox.xcframework.zip Libbox.xcframework

      - name: Detect checksum
        id: checksum
        shell: bash
        run: |
          CHECKSUM=$(shasum -a 256 box/Libbox.xcframework.zip | awk '{print $1}')
          echo "file_checksum=$CHECKSUM" >> "$GITHUB_ENV"

      - name: Update Package.swift
        shell: bash
        run: |
          cat > Package.swift <<EOF
          // swift-tools-version: 5.7

          import PackageDescription

          let package = Package(
            name: "Libbox",
            platforms: [.iOS(.v12)],
            products: [
              .library(name: "Libbox", targets: ["Libbox"]),
            ],
            targets: [
              .binaryTarget(
                name: "Libbox",
                url: "https://github.com/alipeng/sing-box-lib/releases/download/${{ github.event.inputs.version }}/Libbox.xcframework.zip",
                checksum: "${{ env.file_checksum }}"
              )
            ]
          )
          EOF

      - name: Commit manifest & tag
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Libbox Release ${{ github.event.inputs.version }}"
          commit_user_name: "Ebrahim"
          commit_user_email: "njalipeng@gmail.com"
          tagging_message: "${{ github.event.inputs.version }}"
          file_pattern: Package.swift

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          tag_name: ${{ github.event.inputs.version }}
          body: "Compiled from sing-box source tag: ${{ github.event.inputs.tag }}"
          files: box/Libbox.xcframework.zip
